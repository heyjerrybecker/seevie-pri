{% extends "base.html" %}
{% block title %}Upload SBOM{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Upload SBOM</h1>
    <p>Index a new SBOM for vulnerability triage</p>
</div>
<div class="section" style="max-width: 600px;">
    <form hx-post="/sbom" hx-encoding="multipart/form-data" hx-target="#upload-result">
        <div class="form-group">
            <label for="name">Service Name (optional)</label>
            <input type="text" id="name" name="name" placeholder="e.g., payment-api">
        </div>
        <div class="form-group">
            <label for="file">SBOM File (CycloneDX or SPDX JSON)</label>
            <div class="upload-area" onclick="document.getElementById('file').click()">
                <input type="file" id="file" name="file" accept=".json,.xml">
                <label for="file">Click to select or drag and drop</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Upload &amp; Index</button>
    </form>
    <div id="upload-result"></div>
</div>
{% endblock %}
